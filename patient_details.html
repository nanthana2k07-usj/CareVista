<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CareVista - Patient Details</title>

<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
font-family:'Public Sans',sans-serif;
margin:0;
background:#f8fafc;
color:#0f172a;
}

/* MAIN */

main{
max-width:850px;
margin:auto;
padding:40px 30px;
}

/* TITLE */

.title{
text-align:center;
margin-bottom:35px;
}

.title h1{
font-size:32px;
margin-bottom:10px;
font-weight:700;
}

.title p{
color:#64748b;
}

/* CARD */

.card{
background:white;
padding:35px;
border-radius:16px;
box-shadow:0 15px 35px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
box-shadow:0 20px 40px rgba(0,0,0,0.12);
}

/* SECTION */

.section{
margin-bottom:40px;
}

.section h2{
border-bottom:1px solid #e2e8f0;
padding-bottom:8px;
margin-bottom:20px;
display:flex;
align-items:center;
gap:8px;
font-size:20px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.full{
grid-column:1 / span 2;
}

/* LABEL */

label{
font-weight:600;
font-size:14px;
display:block;
margin-bottom:6px;
color:#334155;
}

/* MODERN INPUT */

input,select,textarea{
width:100%;
padding:12px 14px;
border-radius:10px;
border:1px solid #e2e8f0;
background:white;
font-size:14px;
transition:all 0.25s ease;
}

/* INPUT FOCUS */

input:focus,select:focus,textarea:focus{
outline:none;
border-color:#6366f1;
box-shadow:0 0 0 3px rgba(99,102,241,0.15);
}

/* TEXTAREA */

textarea{
resize:none;
}

/* RADIO */

.radio-group{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.radio-option{
flex:1;
text-align:center;
border:1px solid #e2e8f0;
padding:12px;
border-radius:10px;
cursor:pointer;
transition:0.25s;
font-weight:500;
}

.radio-option input{
display:none;
}

.radio-option:hover{
border-color:#6366f1;
}

.radio-option.active{
background:#eef2ff;
border-color:#6366f1;
color:#4f46e5;
}

/* BUTTON */

.submit-btn{
margin-top:20px;
width:100%;
padding:15px;
background:linear-gradient(90deg,#6366f1,#8b5cf6);
color:white;
font-weight:600;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
transition:0.25s;
box-shadow:0 8px 20px rgba(99,102,241,0.25);
}

.submit-btn:hover{
transform:translateY(-2px);
box-shadow:0 12px 28px rgba(99,102,241,0.35);
}

/* FOOTER */

footer{
margin-top:40px;
text-align:center;
color:#64748b;
font-size:14px;
}

</style>

</head>

<body>

<main>

<div class="title">

<h1>CareVista Patient Information</h1>

<p>Please enter your basic details before starting the health analysis.</p>

</div>

<div class="card">

<form action="/patient_details" method="POST">

<!-- PERSONAL -->

<div class="section">

<h2>
<span class="material-symbols-outlined">person</span>
Personal Information
</h2>

<div class="grid">

<div class="full">

<label>Full Name</label>
<input type="text" name="name" placeholder="Enter your name" required>

</div>

<div>

<label>Age</label>
<input type="number" name="age" placeholder="Enter your age" required>

</div>

<div>

<label>Gender</label>

<select name="gender" required>

<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>

</select>

</div>

<div>

<label>Phone Number</label>
<input type="tel" placeholder="Enter your Phone Number" name="phone">

</div>

<div>

<label>Email Address</label>
<input type="email" placeholder="Enter your Email Address" name="email">

</div>

</div>

</div>

<!-- HEALTH -->

<div class="section">

<h2>
<span class="material-symbols-outlined">health_and_safety</span>
Health Background
</h2>

<label>Existing Medical Conditions</label>

<select id="conditionSelect" name="condition">

<option value="none">None</option>
<option value="diabetes">Diabetes</option>
<option value="hypertension">Hypertension</option>
<option value="heart_disease">Heart Disease</option>
<option value="other">Other</option>

</select>
<input id="otherCondition" placeholder="Other Conditions" name="other_condition" type="text">

<br><br>

<label>Current Medications</label>

<textarea name="medications" rows="3" placeholder="List your medications or enter 'None'"></textarea>

</div>

<!-- LIFESTYLE -->

<div class="section">

<h2>
<span class="material-symbols-outlined">style</span>
Lifestyle Information
</h2>

<label>Smoking Habit</label>

<div class="radio-group">

<label class="radio-option">
<input type="radio" name="smoking" value="no">
No
</label>

<label class="radio-option">
<input type="radio" name="smoking" value="occasionally">
Occasionally
</label>

<label class="radio-option">
<input type="radio" name="smoking" value="yes">
Yes
</label>

</div>

<br>

<label>Alcohol Consumption</label>

<div class="radio-group">

<label class="radio-option">
<input type="radio" name="alcohol" value="no">
No
</label>

<label class="radio-option">
<input type="radio" name="alcohol" value="occasionally">
Occasionally
</label>

<label class="radio-option">
<input type="radio" name="alcohol" value="yes">
Yes
</label>

</div>

</div>

<button class="submit-btn">

Continue to Symptom Analysis →

</button>

</form>

</div>

</main>

<footer>

<p>© 2026 CareVista AI Healthcare Monitoring System</p>

</footer>

<script>

/* Show textbox if "Other" selected */

const select=document.getElementById("conditionSelect");
const otherInput=document.getElementById("otherCondition");

select.addEventListener("change",function(){

if(this.value==="other"){
otherInput.style.display="block";
}else{
otherInput.style.display="none";
}

});

/* Radio highlight */

document.querySelectorAll(".radio-option").forEach(option=>{

option.addEventListener("click",()=>{

let group=option.parentElement.querySelectorAll(".radio-option");

group.forEach(el=>el.classList.remove("active"));

option.classList.add("active");

});

});

</script>

</body>
</html>
